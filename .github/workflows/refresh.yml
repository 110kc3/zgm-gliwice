name: Sync auction data

# Data is no longer scraped here. The canonical pipeline lives in
# 110kc3/przetargimiejskie, which scrapes + OCRs the ZGM Gliwice auction PDFs
# and publishes per-city JSON. This workflow just mirrors the Gliwice slice
# into data/gliwice/ so the extension keeps serving it from this repo.

on:
  schedule:
    - cron: '0 7 * * 1'      # Mondays 07:00 UTC — an hour after upstream refreshes.
  workflow_dispatch: {}      # adds a "Run workflow" button in the Actions UI

permissions:
  contents: write

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync Gliwice data from przetargimiejskie
        run: node scripts/sync-from-przetargimiejskie.mjs

      - name: Commit and push if data changed
        run: |
          git config user.name  "zgm-data-bot"
          git config user.email "zgm-data-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: sync from przetargimiejskie $(date -u +%Y-%m-%d)"
            git push
          fi
