<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <title>ZGM auction history</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1 data-i18n="popup.currently_active"></h1>
    <div class="header-actions">
      <button id="lang-toggle" type="button" title="PL / EN"></button>
      <button id="refresh" type="button" data-i18n="popup.refresh"></button>
    </div>
  </header>
  <p id="status" class="muted"></p>
  <section id="watching-section" hidden>
    <h2 data-i18n="popup.watching_section"></h2>
    <table id="watching-table">
      <thead>
        <tr>
          <th></th>
          <th></th>
        <th data-i18n="popup.col.property"></th>
          <th data-i18n="popup.col.status"></th>
          <th></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>
  <h2 id="active-heading" data-i18n="popup.active_section" hidden></h2>
  <table id="active-table" hidden>
    <thead>
      <tr>
        <th data-i18n="popup.col.property"></th>
        <th data-i18n="popup.col.kind"></th>
        <th data-i18n="popup.col.dates"></th>
        <th data-i18n="popup.col.ask"></th>
        <th data-i18n="popup.col.ask_per_m2"></th>
        <th data-i18n="popup.col.prior"></th>
        <th data-i18n="popup.col.last_unsold"></th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <footer>
    <span id="meta" class="muted"></span>
    <span class="footer-links">
      <a class="zgm-support" target="_blank" rel="noopener" href="https://buycoffee.to/kc-it" data-i18n="popup.support"></a>
      <a id="archive-link" href="archive.html" target="_blank" data-i18n="popup.archive_link"></a>
      <a target="_blank" rel="noopener" href="https://github.com/110kc3/zgm-gliwice" data-i18n="popup.repo"></a>
    </span>
  </footer>
  <script src="i18n.js"></script>
  <script src="watchlist.js"></script>
  <script src="popup.js"></script>
</body>
</html>
